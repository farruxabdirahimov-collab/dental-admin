  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <div id="app">
    <!-- Dinamik kontent bu yerga yuklanadi -->
    <div class="loading-screen" id="loading-screen">
      <div class="loading-logo">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect width="48" height="48" rx="12" fill="url(#lg1)"/>
          <path d="M14 24C14 18.477 18.477 14 24 14C29.523 14 34 18.477 34 24" stroke="white" stroke-width="3" stroke-linecap="round"/>
          <circle cx="24" cy="30" r="6" fill="white" fill-opacity="0.9"/>
          <circle cx="24" cy="30" r="3" fill="url(#lg1)"/>
          <defs>
            <linearGradient id="lg1" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
              <stop stop-color="#6366f1"/>
              <stop offset="1" stop-color="#8b5cf6"/>
            </linearGradient>
          </defs>
        </svg>
        <span>DentAdmin</span>
      </div>
      <div class="loading-spinner"></div>
    </div>
